# Extend default Gitleaks rules; allowlist Alembic migration revision IDs (hex hashes).
# Revision IDs like b4a9c1d2e8f0 in down_revision are not secrets.
[extend]
useDefault = true

[[allowlists]]
id = "alembic-revisions"
description = "Alembic migration revision IDs (hex hashes) are not API keys"
paths = ['apps/backend/migrations/.*\\.py']

[[allowlists]]
id = "third-party-venv-example-tokens"
description = "fastapi_users bearer.py embeds an example JWT in its OpenAPI schema; these are .venv pyc false positives"
paths = ['\\.venv/.*', 'apps/backend/\\.venv/.*']

[[allowlists]]
id = "runtime-tls-certs"
description = "Runtime self-signed TLS certs generated by entrypoint-mono.sh on first container start; never committed"
paths = ['docker/data/tls/.*', 'docker/circuitbreaker-data/tls/.*']
