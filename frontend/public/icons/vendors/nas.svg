  <circle cx="18" cy="8"   r="0.8" fill="white" stroke="none"/>
  <circle cx="18" cy="12"  r="0.8" fill="white" stroke="none"/>
  <circle cx="18" cy="16"  r="0.8" fill="white" stroke="none"/>
