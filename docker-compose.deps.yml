services:
  postgres:
    image: postgres:16-alpine
    ports: ["5432:5432"]
    environment:
      POSTGRES_USER: breaker
      POSTGRES_PASSWORD: breaker
      POSTGRES_DB: circuitbreaker
    volumes: ["postgres-data:/var/lib/postgresql/data"]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    volumes: ["redis-data:/data"]

  nats:
    image: nats:2.10-alpine
    ports: ["4222:4222"]
    command: ["--js", "--auth", "dev-token-local-only"]
    volumes: ["nats-data:/nats"]

volumes:
  postgres-data:
  redis-data:
  nats-data: