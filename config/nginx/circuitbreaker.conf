# Circuit Breaker — Nginx reverse-proxy configuration
# Generated by envsubst during install
# Variables: CB_PORT, CB_SSL_PORT, CB_DATA_DIR, CB_APP_ROOT

pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50m;

    # Upstream backend
    upstream backend {
        server 127.0.0.1:8000;
    }

    # ─── HTTP server (redirect to HTTPS when TLS is available) ───
    server {
        listen ${CB_PORT:-8080};
        server_name _;

        # Health endpoint — exempted from HTTPS redirect
        location = /api/v1/health {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Redirect everything else to HTTPS if TLS is configured
        location / {
            # When no TLS cert exists, this block serves the app over HTTP.
            # The install script will toggle the redirect below once TLS is set up.
            # return 301 https://$host:${CB_SSL_PORT:-8443}$request_uri;

            root ${CB_APP_ROOT}/frontend/dist;
            index index.html;

            # Security headers
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' ws: wss:; font-src 'self';" always;

            # Static asset caching (long-term, hashed filenames)
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
                expires 30d;
                add_header Cache-Control "public, immutable";
                try_files $uri =404;
            }

            # WebSocket / SSE streams
            location ~ ^/api/v1/(discovery|topology|status|telemetry|events)/stream {
                proxy_pass http://backend;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_read_timeout 86400s;
                proxy_send_timeout 86400s;
                proxy_buffering off;
                proxy_cache off;
            }

            # Backend API proxy
            location /api/ {
                proxy_pass http://backend;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_read_timeout 300s;
                error_page 502 = @backend_warming_up;
            }

            # User content proxies
            location /user-icons/ {
                proxy_pass http://backend;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                expires 7d;
                add_header Cache-Control "public";
            }

            location /branding/ {
                proxy_pass http://backend;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                expires 7d;
                add_header Cache-Control "public";
            }

            location /uploads/ {
                proxy_pass http://backend;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                expires 7d;
                add_header Cache-Control "public";
            }

            # React SPA catch-all
            try_files $uri $uri/ /index.html;
        }

        # Backend warming-up fallback
        location @backend_warming_up {
            default_type application/json;
            return 503 '{"detail":"Circuit Breaker is starting up. Please try again in a moment."}';
        }
    }

    # ─── HTTPS server ───
    server {
        listen ${CB_SSL_PORT:-8443} ssl http2;
        server_name _;

        ssl_certificate     ${CB_DATA_DIR}/tls/fullchain.pem;
        ssl_certificate_key ${CB_DATA_DIR}/tls/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        root ${CB_APP_ROOT}/frontend/dist;
        index index.html;

        # Security headers
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' ws: wss:; font-src 'self';" always;

        # Static asset caching (long-term, hashed filenames)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # WebSocket / SSE streams
        location ~ ^/api/v1/(discovery|topology|status|telemetry|events)/stream {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
            proxy_buffering off;
            proxy_cache off;
        }

        # Backend API proxy
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            error_page 502 = @backend_warming_up;
        }

        # User content proxies
        location /user-icons/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            expires 7d;
            add_header Cache-Control "public";
        }

        location /branding/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            expires 7d;
            add_header Cache-Control "public";
        }

        location /uploads/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            expires 7d;
            add_header Cache-Control "public";
        }

        # React SPA catch-all
        try_files $uri $uri/ /index.html;

        # Backend warming-up fallback
        location @backend_warming_up {
            default_type application/json;
            return 503 '{"detail":"Circuit Breaker is starting up. Please try again in a moment."}';
        }
    }
}
