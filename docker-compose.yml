# Root-level docker-compose.yml — single-container stack.
#
# Usage (from repo root):
#   docker compose up -d          # start
#   docker compose down            # stop
#   docker compose down -v         # stop + remove volume data
#
# Required: CB_DB_PASSWORD and CB_VAULT_KEY (export or .env). See README.
include:
  - path: docker/docker-compose.yml
