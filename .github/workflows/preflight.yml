name: Preflight

on:
  workflow_dispatch:
  push:
    branches:
      - dev
      - main

permissions: read-all

jobs:
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install apps/backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -e "./apps/backend[dev]"

      - name: Run apps/backend tests
        if: false  # Disabled: integration tests require Postgres; re-enable when CI DB is set up
        working-directory: apps/backend
        run: pytest -q

      - name: Install apps/frontend deps
        working-directory: apps/frontend
        run: npm ci

      - name: Build apps/frontend
        working-directory: apps/frontend
        run: npm run build

      - name: Build Docker image
        run: docker build -t circuit-breaker:preflight .

      - name: Run Docker smoke test
        run: |
          docker run -d --name circuit-breaker-smoke -p 8080:8080 -e HOST=0.0.0.0 circuit-breaker:preflight
          # Match Dockerfile HEALTHCHECK start-period (45s): entrypoint chown + migrations + uvicorn cold start
          sleep 45
          curl --fail --retry 10 --retry-delay 5 http://127.0.0.1:8080/api/v1/health

      - name: Cleanup Docker container
        if: always()
        run: docker rm -f circuit-breaker-smoke || true
