name: Docs Pages Fallback

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy-fallback:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify committed site output exists
        run: |
          test -f site/index.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload fallback site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy fallback to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
