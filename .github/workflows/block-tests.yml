name: Block Tests in Prod Paths
on: [pull_request]
jobs:
  check-prod:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Block tests/ in apps/
        run: |
          if git diff --name-only origin/main | grep -E '^apps/.*tests/' ; then
            echo '❌ Tests detected in production paths (apps/)'
            exit 1
          fi
