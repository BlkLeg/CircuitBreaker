name: Native Binaries & Cross-Platform Tests
on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  # Docker multi-arch builds (primary for Linux/Pi)
  docker-multiarch:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build & Push Multi-Arch
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Test on Pi emulation (QEMU)
  test-pi:
    runs-on: ubuntu-latest
    needs: docker-multiarch
    steps:
      - name: Test Pi ARM64
        uses: uraimo/run-on-arch-action@v2
        with:
          arch: aarch64
          distro: ubuntu22_04
          package: docker.io
          cmd: |
            docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            docker run --rm -p 8080:8080 \
              --platform linux/arm64 \
              ghcr.io/${{ github.repository }}:${{ github.ref_name }} &
            sleep 10
            curl -f http://localhost:8080/health || (echo "Health check failed"; exit 1)
            curl -f http://localhost:8080/api/v1/settings || (echo "Settings failed"; exit 1)

  # macOS/Windows browser smoke (Dockerized app)
  browser-smoke:
    runs-on: ${{ matrix.os }}
    needs: docker-multiarch
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - name: Pull & Test
        run: |
          docker run --rm -p 8080:8080 \
            ghcr.io/${{ github.repository }}:${{ github.ref_name }} &
          sleep 15
          curl -f http://localhost:8080/health
          curl -f http://localhost:8080/api/v1/graph/topology
        shell: bash

  # Release assets (if you still want native Python binaries)
  native-python:
    runs-on: ubuntu-latest
    needs: docker-multiarch
    steps:
      - uses: actions/checkout@v4
      
      # PyInstaller for static Python binaries
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install PyInstaller
        run: pip install pyinstaller
      
      - name: Install backend dependencies
        run: pip install ./backend

      - name: Build Linux static binary
        run: |
          pyinstaller --onefile --noconsole \
            --name "circuit-breaker-${{ github.ref_name }}-linux-amd64" \
            backend/app/main.py
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: native-python-binaries
          path: dist/
