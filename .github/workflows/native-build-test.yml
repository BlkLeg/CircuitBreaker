name: Native Build Test

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  native-build:
    name: Native Build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-amd64
          - os: ubuntu-24.04-arm
            label: linux-arm64
          - os: macos-14
            label: macos-arm64
          - os: windows-latest
            label: windows-amd64
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install backend dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -e "./apps/backend[dev]"
          pip install pyinstaller

      - name: Build frontend bundle
        shell: bash
        run: |
          cd apps/frontend
          npm ci
          npm run build

      - name: Build packaged native asset
        shell: bash
        run: |
          python scripts/build_native_release.py --clean

      - name: Smoke test Linux/macOS native package
        if: runner.os != 'Windows'
        shell: bash
        run: |
          python - <<'PY'
          import shutil
          import subprocess
          import tarfile
          import tempfile
          import time
          import urllib.request
          from pathlib import Path

          archive = next(Path("dist/native").glob("*.tar.gz"))
          tmpdir = Path(tempfile.mkdtemp(prefix="cb-native-"))
          with tarfile.open(archive, "r:gz") as tar:
              tar.extractall(tmpdir)

          binary = tmpdir / "circuit-breaker"
          config = tmpdir / "config.yaml"
          config.write_text(
              "\n".join(
                  [
                      "host: 127.0.0.1",
                      "port: 18080",
                      f"data_dir: {tmpdir / 'data'}",
                      f"share_dir: {tmpdir / 'share'}",
                      f"static_dir: {tmpdir / 'share' / 'frontend'}",
                  ]
              ),
              encoding="utf-8",
          )

          proc = subprocess.Popen([str(binary), "--config", str(config)])
          try:
              for _ in range(30):
                  try:
                      with urllib.request.urlopen("http://127.0.0.1:18080/api/v1/health", timeout=2) as resp:
                          body = resp.read().decode()
                          if '"status":"ok"' in body.replace(" ", ""):
                              break
                  except Exception:
                      time.sleep(2)
              else:
                  raise SystemExit("Native health check timed out")
          finally:
              proc.terminate()
              try:
                  proc.wait(timeout=10)
              except subprocess.TimeoutExpired:
                  proc.kill()
                  proc.wait(timeout=10)
              shutil.rmtree(tmpdir, ignore_errors=True)
          PY

      - name: Smoke test Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $archive = Get-ChildItem dist/native/*.zip | Select-Object -First 1
          $dest = Join-Path $env:RUNNER_TEMP "cb-native-win"
          if (Test-Path $dest) { Remove-Item $dest -Recurse -Force }
          [System.IO.Compression.ZipFile]::ExtractToDirectory($archive.FullName, $dest)
          & (Join-Path $dest "circuit-breaker.exe") --version

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: native-build-${{ matrix.label }}
          path: dist/native/*
