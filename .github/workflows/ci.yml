name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Install Python deps
        run: |
          python3.12 -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -e "apps/backend/[dev]"

      - name: Install frontend deps
        run: cd apps/frontend && npm ci

      - name: Ruff check
        run: cd apps/backend && ../../.venv/bin/ruff check src/app

      - name: Mypy
        run: cd apps/backend && PYTHONPATH=src ../../.venv/bin/mypy src/app

      - name: ESLint
        run: cd apps/frontend && npm run lint

  test:
    name: Test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Install frontend deps
        run: cd apps/frontend && npm ci

      - name: Frontend tests
        run: cd apps/frontend && npm test
