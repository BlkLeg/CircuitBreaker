name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Install Python deps
        run: |
          python3.12 -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -e "apps/backend/[dev]"

      - name: Alembic revision graph (single head)
        env:
          CB_DB_URL: postgresql://cb_ci:cb_ci@127.0.0.1:5432/cb_ci
        run: |
          cd apps/backend
          PYTHONPATH=src ../../.venv/bin/python -c "
          from alembic.config import Config
          from alembic.script import ScriptDirectory
          cfg = Config('alembic.ini')
          heads = ScriptDirectory.from_config(cfg).get_heads()
          assert len(heads) == 1, f'expected 1 Alembic head, got: {heads!r}'
          print('Alembic head:', heads[0])
          "

      - name: Install frontend deps
        run: cd apps/frontend && npm ci

      - name: Ruff check
        run: cd apps/backend && ../../.venv/bin/ruff check src/app

      - name: Mypy
        run: cd apps/backend && PYTHONPATH=src ../../.venv/bin/mypy src/app

      - name: ESLint
        run: cd apps/frontend && npm run lint

  security-gate:
    name: Security Gate
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install scan tools
        run: |
          python3.12 -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install bandit semgrep

      - name: Run security gate (fails on HIGH/CRIT)
        run: ./scripts/security_scan.sh --gate

      - name: Upload scan report
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: security-scan-report
          path: security_scan_report.md
          retention-days: 30

  test:
    name: Test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Install frontend deps
        run: cd apps/frontend && npm ci

      - name: Frontend tests
        run: cd apps/frontend && npm test
