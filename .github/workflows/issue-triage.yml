# .github/workflows/issue-triage.yml
name: Ollama Issue Triage
on:
  issues:
    types: [opened, edited]
jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: triage
        uses: ai-action/ollama-action@v1
        with:
          model: llama3.2:3b
          prompt: |
            Triage GitHub issue for Circuit Breaker homelab app:
            ${{ github.event.issue.title }}
            ${{ github.event.issue.body }}
            
            Labels (choose 1-3): bug, enhancement, docker, security, perf, 
            roadmap-v0.1.2, telemetry, racks, discovery.
            Priority: P0(crash), P1(prod), P2(cosmetic).
            Assign milestone: v0.1.2, v0.2.0.
            
            JSON: {"labels":["bug"],"milestone":1,"priority":"P1"}
      - uses: actions-ecosystem/action-add-labels@v1
        with:
          labels: ${{ fromJson(steps.triage.outputs.response).labels }}
      - if: contains(fromJson(steps.triage.outputs.response).priority, 'P0')
        uses: actions-ecosystem/action-create-comment@v1
        with:
          github_token: ${{ secrets.GH_TOKEN }}
          body: 🚨 P0 detected. @owner triage now.