name: Docker Build & Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    name: Multi-arch Build & Push to GHCR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tag
        id: vars
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            RAW_TAG="${{ github.ref_name }}"
          else
            RAW_TAG="dev"
          fi
          SAFE_TAG=$(printf '%s' "$RAW_TAG" | tr -cd '[:alnum:]_.-')
          if [ -z "$SAFE_TAG" ]; then
            echo "Empty tag after sanitization" >&2
            exit 1
          fi
          # Append -beta for 0.x.y versions; bare version for v1+
          MAJOR=$(echo "$SAFE_TAG" | sed 's/^v//' | cut -d. -f1)
          if [ "$MAJOR" -lt 1 ] 2>/dev/null; then
            RELEASE_TAG="${SAFE_TAG}-beta"
          else
            RELEASE_TAG="$SAFE_TAG"
          fi
          echo "tag=$SAFE_TAG" >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "repo=ghcr.io/$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build & Push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          build-args: |
            APP_VERSION=${{ steps.vars.outputs.tag }}
          tags: |
            ${{ steps.vars.outputs.repo }}:${{ steps.vars.outputs.release_tag }}
            ${{ steps.vars.outputs.repo }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan main image with Trivy
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: ${{ steps.vars.outputs.repo }}:${{ steps.vars.outputs.release_tag }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
        if: always()

      - name: Build mono image (amd64 for E2E)
        run: |
          docker build -f Dockerfile.mono \
            --build-arg APP_VERSION=${{ steps.vars.outputs.tag }} \
            -t ${{ steps.vars.outputs.repo }}:mono-${{ steps.vars.outputs.tag }} .

      - name: E2E test mono image
        run: |
          CB_MONO_IMAGE=${{ steps.vars.outputs.repo }}:mono-${{ steps.vars.outputs.tag }} ./scripts/test-mono-e2e.sh

      - name: Scan mono image with Trivy
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: ${{ steps.vars.outputs.repo }}:mono-${{ steps.vars.outputs.tag }}
          format: sarif
          output: trivy-results-mono.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy results (mono) to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results-mono.sarif
        if: always()

      - name: Build & Push mono multi-arch (after E2E pass)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.mono
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          build-args: |
            APP_VERSION=${{ steps.vars.outputs.tag }}
          tags: |
            ${{ steps.vars.outputs.repo }}:mono-${{ steps.vars.outputs.tag }}
            ${{ steps.vars.outputs.repo }}:mono-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
