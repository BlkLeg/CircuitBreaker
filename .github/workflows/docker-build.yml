name: Build & Push Docker Image

on:
  push:
    branches:
      - dev
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Read version from the VERSION file and expose it as a step output
      - name: Read version
        id: version
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      # QEMU enables emulation of non-native architectures (arm64) on the amd64 runner
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # Buildx creates a BuildKit builder capable of cross-platform --platform builds
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Generates a consistent set of tags and OCI labels from git context:
      #   - short SHA (always)             → ghcr.io/.../circuit-breaker:sha-abc1234
      #   - branch name                    → ghcr.io/.../circuit-breaker:dev  /  :main
      #   - semver tag (on v* push)        → ghcr.io/.../circuit-breaker:0.2.2
      #   - "latest" only when on main
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/circuit-breaker
          tags: |
            type=sha
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.mono
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
          # GHA cache keeps layer caches between workflow runs without extra registry auth
          cache-from: type=gha
          cache-to: type=gha,mode=max
