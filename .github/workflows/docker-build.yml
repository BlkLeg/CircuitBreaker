name: Docker Build & Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to push (e.g. v0.1.5)'
        required: false
        default: 'dev'

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    name: Multi-arch Build & Push to GHCR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tag
        id: vars
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            RAW_TAG="${{ github.ref_name }}"
          else
            RAW_TAG="${{ github.event.inputs.tag }}"
          fi
          SAFE_TAG=$(printf '%s' "$RAW_TAG" | tr -cd '[:alnum:]_.-')
          if [ -z "$SAFE_TAG" ]; then
            echo "Empty tag after sanitization" >&2
            exit 1
          fi
          # Append -beta for 0.x.y versions; bare version for v1+
          MAJOR=$(echo "$SAFE_TAG" | sed 's/^v//' | cut -d. -f1)
          if [ "$MAJOR" -lt 1 ] 2>/dev/null; then
            RELEASE_TAG="${SAFE_TAG}-beta"
          else
            RELEASE_TAG="$SAFE_TAG"
          fi
          echo "tag=$SAFE_TAG" >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "repo=ghcr.io/$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build & Push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          build-args: |
            APP_VERSION=${{ steps.vars.outputs.tag }}
          tags: |
            ${{ steps.vars.outputs.repo }}:${{ steps.vars.outputs.release_tag }}
            ${{ steps.vars.outputs.repo }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
