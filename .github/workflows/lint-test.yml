name: Lint · Test · Typecheck

on:
  push:
    branches: [main, dev]
    paths-ignore:
      - 'docs/**'
      - '*.md'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '*.md'

permissions: read-all

jobs:
  # ── Backend ──────────────────────────────────────────────────────────────
  apps/backend-lint:
    name: Backend Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Ruff
        uses: astral-sh/ruff-action@v3
      - name: Lint
        run: ruff check apps/backend/src/app
      - name: Format check
        run: ruff format --check apps/backend/src/

  apps/backend-test:
    name: Backend Tests (pytest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: breaker
          POSTGRES_PASSWORD: breaker
          POSTGRES_DB: circuitbreaker_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U breaker -d circuitbreaker_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      CB_TEST_DB_URL: postgresql://breaker:breaker@localhost:5432/circuitbreaker_test
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e "./apps/backend[dev]"
      - name: Run tests with coverage
        working-directory: apps/backend
        run: PYTHONPATH=src pytest ../../tests/integration tests/ --cov=src/app --cov-report=xml -v
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: apps/backend/coverage.xml
          flags: apps/backend

  apps/backend-typecheck:
    name: Backend Typecheck (mypy)
    runs-on: ubuntu-latest
    continue-on-error: true  # Advisory only: mypy is being adopted incrementally
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e "./apps/backend[dev]"
      - name: Run mypy
        working-directory: apps/backend
        run: mypy src/app --ignore-missing-imports --no-error-summary

  # ── Frontend ─────────────────────────────────────────────────────────────
  apps/frontend-lint:
    name: Frontend Lint (eslint + prettier)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/frontend/package-lock.json
      - name: Install deps
        working-directory: apps/frontend
        run: npm ci
      - name: ESLint
        working-directory: apps/frontend
        run: npm run lint
      - name: Prettier check
        working-directory: apps/frontend
        run: npm run format:check

  apps/frontend-test:
    name: Frontend Tests (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/frontend/package-lock.json
      - name: Install deps
        working-directory: apps/frontend
        run: npm ci
      - name: Run tests with coverage
        working-directory: apps/frontend
        run: npm run test:ci -- --coverage
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          flags: apps/frontend

  apps/frontend-typecheck:
    name: Frontend Typecheck (tsc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/frontend/package-lock.json
      - name: Install deps
        working-directory: apps/frontend
        run: npm ci
      - name: tsc --noEmit
        working-directory: apps/frontend
        run: npx tsc --noEmit
