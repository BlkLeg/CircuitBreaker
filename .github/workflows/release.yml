name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.1.3, without the v prefix)"
        required: true

permissions:
  contents: write    # create GitHub Release, upload assets
  packages: write    # push Docker image to GHCR
  pages: write       # deploy GitHub Pages (install redirect)
  id-token: write    # OIDC for pages deployment + cosign keyless signing

jobs:
  # ── Derive version ────────────────────────────────────────────────────────────
  version:
    name: Derive Version
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - name: Derive version string
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            # Strip leading 'v' from tag
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

  # ── Build all packages ────────────────────────────────────────────────────────
  build:
    name: Build Packages
    needs: version
    uses: ./.github/workflows/build.yml
    with:
      version: ${{ needs.version.outputs.version }}

  # ── Create GitHub Release + push Docker ──────────────────────────────────────
  release:
    name: Publish Release
    needs: [version, build]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Download all package artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: packages-*
          merge-multiple: true
          path: dist/release/
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate preliminary SHA256SUMS
        run: |
          cd dist/release/
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Install syft v1.14.0
        run: |
          curl -sSfL \
            https://github.com/anchore/syft/releases/download/v1.14.0/syft_1.14.0_linux_amd64.tar.gz \
            -o /tmp/syft.tar.gz
          echo "21653debfeccb278576ffdd85b5dbe8cd44fcb820cae71e887a6ac2efb399d37  /tmp/syft.tar.gz" | sha256sum -c
          sudo tar -xzf /tmp/syft.tar.gz -C /usr/local/bin syft
          syft version

      - name: Generate source SBOMs
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          syft scan dir:apps/backend \
            --exclude '**/node_modules' \
            --output "cyclonedx-json=dist/release/circuit-breaker_${VERSION}_sbom-backend.cdx.json" \
            --output "spdx-json=dist/release/circuit-breaker_${VERSION}_sbom-backend.spdx.json"
          syft scan dir:apps/frontend \
            --exclude '**/node_modules' \
            --output "cyclonedx-json=dist/release/circuit-breaker_${VERSION}_sbom-frontend.cdx.json" \
            --output "spdx-json=dist/release/circuit-breaker_${VERSION}_sbom-frontend.spdx.json"

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push Docker image
        id: docker_push
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          IMAGE="ghcr.io/blkleg/circuitbreaker"
          docker build -f Dockerfile.mono \
            -t "${IMAGE}:${VERSION}" \
            -t "${IMAGE}:latest" \
            .
          docker push "${IMAGE}:${VERSION}"
          docker push "${IMAGE}:latest"
          DIGEST=$(docker buildx imagetools inspect "${IMAGE}:${VERSION}" \
            --format '{{ .Manifest.Digest }}')
          echo "digest=${IMAGE}@${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Install cosign v2.4.1
        run: |
          curl -sSfL \
            https://github.com/sigstore/cosign/releases/download/v2.4.1/cosign-linux-amd64 \
            -o /tmp/cosign
          echo "8b24b946dd5809c6bd93de08033bcf6bc0ed7d336b7785787c080f574b89249b  /tmp/cosign" | sha256sum -c
          sudo mv /tmp/cosign /usr/local/bin/cosign
          sudo chmod +x /usr/local/bin/cosign
          cosign version

      - name: Generate container SBOM
        env:
          VERSION: ${{ needs.version.outputs.version }}
          IMAGE_DIGEST: ${{ steps.docker_push.outputs.digest }}
        run: |
          syft scan "${IMAGE_DIGEST}" \
            --output "cyclonedx-json=dist/release/circuit-breaker_${VERSION}_sbom-container.cdx.json"

      - name: Sign Docker image with cosign
        env:
          COSIGN_EXPERIMENTAL: "1"
          IMAGE_DIGEST: ${{ steps.docker_push.outputs.digest }}
        run: |
          cosign sign --yes "${IMAGE_DIGEST}"

      - name: Attach container SBOM to image
        env:
          VERSION: ${{ needs.version.outputs.version }}
          IMAGE_DIGEST: ${{ steps.docker_push.outputs.digest }}
        run: |
          cosign attach sbom \
            --sbom "dist/release/circuit-breaker_${VERSION}_sbom-container.cdx.json" \
            --type cyclonedx \
            "${IMAGE_DIGEST}"

      - name: GPG sign artifacts
        if: ${{ secrets.GPG_PRIVATE_KEY != '' }}
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "${GPG_PRIVATE_KEY}" | gpg --batch --import
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          gpgconf --kill gpg-agent

          cd dist/release/
          for f in *.tar.gz *.deb *.rpm *.apk *.pkg.tar.zst *.AppImage *.json; do
            [ -f "$f" ] && [[ "$f" != *.asc ]] || continue
            gpg --batch --yes --pinentry-mode loopback \
                --passphrase "${GPG_PASSPHRASE}" \
                --armor --detach-sign "$f"
          done

          # Regenerate SHA256SUMS (now includes .asc + SBOM files) then sign it
          sha256sum * > SHA256SUMS
          gpg --batch --yes --pinentry-mode loopback \
              --passphrase "${GPG_PASSPHRASE}" \
              --armor --detach-sign SHA256SUMS

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          gh release create "v${VERSION}" \
            --title "Circuit Breaker v${VERSION}" \
            --generate-notes \
            dist/release/* \
            packaging/circuit-breaker-release-key.asc

  # ── Deploy install redirect to GitHub Pages ───────────────────────────────────
  deploy-redirect:
    name: Deploy Install Redirect
    needs: release
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Generate redirect page
        run: |
          mkdir -p _site
          cat > _site/index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta http-equiv="refresh" content="0; url=https://github.com/BlkLeg/circuitbreaker/releases/latest/download/setup.sh">
            <title>Circuit Breaker Installer</title>
          </head>
          <body>
            <p>Redirecting to Circuit Breaker installer…
              <a href="https://github.com/BlkLeg/circuitbreaker/releases/latest/download/setup.sh">Click here if not redirected.</a>
            </p>
          </body>
          </html>
          EOF
          echo "circuitbreaker.shawnji.com" > _site/CNAME

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
