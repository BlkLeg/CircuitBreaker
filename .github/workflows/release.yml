name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Backend Test
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry -C backend install
          pip install -e "./backend[dev]"
          pytest tests/

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend Build
        run: |
          cd frontend
          npm ci
          npm run build
          npm run test

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve safe tag
        id: vars
        shell: bash
        env:
          RAW_TAG: ${{ github.ref_name }}
        run: |
          SAFE_TAG=$(printf '%s' "$RAW_TAG" | tr -cd '[:alnum:]_.-')
          if [ -z "$SAFE_TAG" ]; then
            echo "Resolved tag is empty after sanitization" >&2
            exit 1
          fi
          printf 'tag=%s\n' "$SAFE_TAG" >> "$GITHUB_OUTPUT"

      - name: Docker Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: |
            ghcr.io/blkleg/circuitbreaker:${{ steps.vars.outputs.tag }}
            ghcr.io/blkleg/circuitbreaker:latest
            ghcr.io/blkleg/circuitbreaker:v0.1.4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

