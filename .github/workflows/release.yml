name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0-beta)'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate backend/frontend version consistency
        run: |
          TAG="${{ steps.vars.outputs.tag }}"
          VERSION="${TAG#v}"
          CORE_VERSION="${VERSION%%-*}"
          BACKEND_VERSION=$(grep -E '^version = "' backend/pyproject.toml | sed -E 's/version = "([^"]+)"/\1/')
          FRONTEND_VERSION=$(node -p "require('./frontend/package.json').version")
          test "$BACKEND_VERSION" = "$CORE_VERSION"
          test "$FRONTEND_VERSION" = "$CORE_VERSION"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/circuitbreaker:${{ steps.vars.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/circuitbreaker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save amd64 image tarball for GitHub Release
        run: |
          docker pull --platform linux/amd64 ghcr.io/${{ github.repository_owner }}/circuitbreaker:${{ steps.vars.outputs.tag }}
          docker save ghcr.io/${{ github.repository_owner }}/circuitbreaker:${{ steps.vars.outputs.tag }} \
            | gzip > circuit-breaker-${{ steps.vars.outputs.tag }}.tar.gz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          generate_release_notes: true
          files: |
            circuit-breaker-${{ steps.vars.outputs.tag }}.tar.gz
