# .github/workflows/ollama-runner.yml
name: Ollama GPU Runner
on: [workflow_dispatch]

permissions:
  contents: read

jobs:
  run-ollama:
    runs-on: ubuntu-latest
    steps:
      - name: Run Ollama container
        run: |
          docker run -d \
            -e OLLAMA_HOST=10.10.10.110 \
            ollama/ollama:latest serve
      - name: Pull models
        run: |
          docker exec ollama ollama pull qwen2.5-coder:7b
          docker exec ollama ollama pull llama3.2:3b
    env:
      OLLAMA_API_URL: http://10.10.10.110:11434
