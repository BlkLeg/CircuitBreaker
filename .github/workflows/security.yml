name: Security Scan

on:
  push:
    branches: [main, dev]
  pull_request:
  schedule:
    - cron: '0 4 * * 1'  # Weekly Monday 04:00 UTC

permissions:
  contents: read
  security-events: write

jobs:
  snyk:
    name: Snyk Open-Source Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/frontend/package-lock.json
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install apps/backend deps (for snyk)
        run: |
          python -m pip install --upgrade pip
          pip install -e "./apps/backend[dev]"
      - name: Install apps/frontend deps
        working-directory: apps/frontend
        run: npm ci
      - name: Run Snyk scan
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --all-projects --severity-threshold=high --sarif-file-output=snyk-results.sarif
      - name: Upload Snyk results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: snyk-results.sarif

  trivy-fs:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs-results.sarif
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
      - name: Upload Trivy filesystem results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-fs-results.sarif

  trivy-config:
    name: Trivy Config / IaC Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy config scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: .
          format: sarif
          output: trivy-config-results.sarif
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
      - name: Upload Trivy config results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-config-results.sarif

  semgrep:
    name: Semgrep (SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Semgrep
        run: pip install semgrep
      - name: Run Semgrep
        run: semgrep scan --config p/default --error --sarif --output semgrep.sarif apps/backend/src/ apps/frontend/src/ docker/
      - name: Upload Semgrep results
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('semgrep.sarif') != ''
        with:
          sarif_file: semgrep.sarif

  bandit:
    name: Bandit (Python SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Bandit
        run: pip install bandit
      - name: Run Bandit
        run: bandit -r apps/backend/src/ -ll --skip B101 -f sarif -o bandit-results.sarif
      - name: Upload Bandit results
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('bandit-results.sarif') != ''
        with:
          sarif_file: bandit-results.sarif

  gitleaks:
    name: Gitleaks (Secret Scanning)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  checkov:
    name: Checkov (IaC)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Checkov
        run: pip install checkov
      - name: Run Checkov
        run: checkov -d docker/ -d . --skip-path apps/ --skip-path node_modules/ --skip-path site/ --output sarif --output-file-path checkov-results.sarif --quiet
      - name: Upload Checkov results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: checkov-results.sarif

  trivy-image:
    name: Trivy Container Image Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image for scanning
        run: docker build -f Dockerfile.mono -t cb-scan:local .
      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: cb-scan:local
          format: sarif
          output: trivy-image-results.sarif
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
      - name: Upload Trivy image results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-image-results.sarif

  hadolint:
    name: Hadolint (Dockerfile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Hadolint
        run: |
          for f in Dockerfile.mono docker/backend.Dockerfile docker/frontend.Dockerfile; do
            [ -f "$f" ] && docker run --rm -v "$(pwd):/repo" -w /repo hadolint/hadolint hadolint "$f"
          done

  runtime-user:
    name: Runtime User Policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build images for user checks
        run: |
          docker build -f Dockerfile -t cb-usercheck-main .
          docker build -f docker/backend.Dockerfile -t cb-usercheck-backend .
          docker build -f Dockerfile.mono -t cb-usercheck-mono .
      - name: Enforce non-root runtime user
        run: |
          check_user() {
            image="$1"
            user="$(docker inspect "$image" --format '{{.Config.User}}')"
            if [ -z "$user" ] || [ "$user" = "root" ] || [ "$user" = "0" ] || [ "$user" = "0:0" ] || [ "$user" = "root:root" ]; then
              echo "[runtime-user] FAIL $image runs as root (Config.User='$user')"
              exit 1
            fi
            echo "[runtime-user] PASS $image user='$user'"
          }
          check_user cb-usercheck-main
          check_user cb-usercheck-backend
          check_user cb-usercheck-mono
