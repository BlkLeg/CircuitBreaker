name: Native Binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version override (e.g. 0.2.2)"
        required: false

permissions:
  contents: write

jobs:
  build-linux:
    strategy:
      matrix:
        arch: [amd64, arm64]
        include:
          - arch: amd64
            runner: ubuntu-22.04
          - arch: arm64
            runner: ubuntu-22.04
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Set version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            echo "version=$INPUT_VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(cat VERSION | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: matrix.arch == 'amd64'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        if: matrix.arch == 'amd64'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Build frontend
        if: matrix.arch == 'amd64'
        run: |
          cd apps/frontend
          npm ci
          npm run build

      - name: Build native binary (amd64)
        if: matrix.arch == 'amd64'
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/backend/requirements.txt
          pip install -r apps/backend/requirements-pg.txt
          pip install pyinstaller
          python scripts/build_native_release.py --clean

      - name: Build native binary (arm64 via Docker)
        if: matrix.arch == 'arm64'
        run: |
          make build-native-docker

      - name: Install nfpm
        run: |
          curl -sfL https://github.com/goreleaser/nfpm/releases/latest/download/nfpm_linux_amd64.tar.gz \
            | tar xz -C /usr/local/bin nfpm

      - name: Build deb/rpm packages
        env:
          PKG_VERSION: ${{ steps.version.outputs.version }}
          PKG_ARCH: ${{ matrix.arch }}
        run: |
          VERSION="$PKG_VERSION" GOARCH="$PKG_ARCH" \
            nfpm package --config nfpm.yaml --packager deb --target dist/native/
          VERSION="$PKG_VERSION" GOARCH="$PKG_ARCH" \
            nfpm package --config nfpm.yaml --packager rpm --target dist/native/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: native-linux-${{ matrix.arch }}
          path: dist/native/*
          retention-days: 5

  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Set version
        id: version
        run: echo "version=$(cat VERSION | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Build frontend
        run: cd apps/frontend && npm ci && npm run build

      - name: Build native binary
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/backend/requirements.txt
          pip install -r apps/backend/requirements-pg.txt
          pip install pyinstaller
          python scripts/build_native_release.py --clean

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: native-macos-arm64
          path: dist/native/*
          retention-days: 5

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set version
        id: version
        shell: bash
        run: echo "version=$(cat VERSION | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Build frontend
        run: cd apps/frontend && npm ci && npm run build

      - name: Build native binary
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/backend/requirements.txt
          pip install -r apps/backend/requirements-pg.txt
          pip install pyinstaller
          python scripts/build_native_release.py --clean

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: native-windows-amd64
          path: dist/native/*
          retention-days: 5

  publish:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: false

      - name: Collect all artifacts
        run: |
          mkdir -p release/
          find artifacts/ -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.deb" -o -name "*.rpm" -o -name "*.sha256" -o -name "*.json" \) \
            -exec cp {} release/ \;
          ls -la release/

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          fail_on_unmatched_files: false
