# Circuit Breaker NATS Configuration
host: "127.0.0.1"
port: 4222
http: 127.0.0.1:8222

authorization {
  token: "${CB_NATS_TOKEN}"
}

jetstream {
  store_dir: "${CB_DATA_DIR}/nats"
  max_memory_store: 256MB
  max_file_store: 2GB
}

max_payload: 8MB
max_connections: 1000
ping_interval: 30s
ping_max: 3

log_file: "${CB_DATA_DIR}/logs/nats.log"
