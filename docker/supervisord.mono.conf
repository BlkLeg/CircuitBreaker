; supervisord itself stays root so the workers launcher can grant ambient
; CAP_NET_RAW via setpriv (a breaker-uid supervisord cannot raise a child's
; capabilities). Every service program below drops to breaker explicitly via
; user=... or its setpriv launcher; nothing application-facing runs as root.
[supervisord]
user=root
logfile=/data/supervisord.log
pidfile=/data/supervisord.pid
nodaemon=true
childlogdir=/data

; ------------------------------------------------------------------------------
; Postgres (embedded; Debian Bookworm default is PostgreSQL 15)
; Wrapper: only start postgres when CB_DB_URL is localhost/127.0.0.1; otherwise sleep (external DB).
; ------------------------------------------------------------------------------
[program:postgres]
priority=10
command=/docker/run-postgres-if-embedded.sh
autostart=true
autorestart=true
startsecs=5
startretries=10
stopwaitsecs=30
stderr_logfile=/data/pg_err.log
stdout_logfile=/data/pg.log
user=breaker
redirect_stderr=false

; ------------------------------------------------------------------------------
; pgbouncer — connection pooler (transaction-mode pooling for the backend)
; Sits between backend and Postgres on port 6432.
; Only starts when CB_DB_URL routes through localhost (embedded DB mode).
; ------------------------------------------------------------------------------
[program:pgbouncer]
priority=15
command=/bin/sh -c 'if echo "$CB_DB_URL" | grep -qE "localhost|127\\.0\\.0\\.1"; then exec /usr/sbin/pgbouncer /etc/pgbouncer/pgbouncer.ini; else echo "[pgbouncer] External DB — sleeping"; exec sleep infinity; fi'
directory=/data
autostart=true
autorestart=true
startsecs=2
startretries=10
stderr_logfile=/data/pgbouncer_err.log
stdout_logfile=/data/pgbouncer.log
user=breaker

; ------------------------------------------------------------------------------
; NATS JetStream (embedded; auth mandatory via NATS_AUTH_TOKEN)
; If NATS_AUTH_TOKEN is unset the server refuses to start — this is intentional
; to prevent unauthenticated access to the internal event bus.
; ------------------------------------------------------------------------------
[program:nats]
priority=20
command=/bin/sh -c 'if [ -z "$NATS_AUTH_TOKEN" ]; then echo "[nats] FATAL: NATS_AUTH_TOKEN is required" >&2; exit 1; fi; exec nats-server --jetstream --store_dir /data/nats --auth "$NATS_AUTH_TOKEN"'
directory=/data
autostart=true
autorestart=true
startsecs=3
startretries=10
stderr_logfile=/data/nats_err.log
stdout_logfile=/data/nats.log
user=breaker

; ------------------------------------------------------------------------------
; Redis (embedded; telemetry cache + pub/sub for real-time push)
; Memory capped at 128 MB with LRU eviction for cache safety.
; ------------------------------------------------------------------------------
[program:redis]
priority=25
command=/bin/sh -c 'PASS=$(cat /data/.redis_pass 2>/dev/null || echo ""); if [ -n "$PASS" ]; then exec /usr/bin/redis-server --daemonize no --dir /data/redis --maxmemory 128mb --maxmemory-policy allkeys-lru --bind 127.0.0.1 --protected-mode yes --save "" --requirepass "$PASS"; else exec /usr/bin/redis-server --daemonize no --dir /data/redis --maxmemory 128mb --maxmemory-policy allkeys-lru --bind 127.0.0.1 --protected-mode yes --save ""; fi'
directory=/data
autostart=true
autorestart=true
startsecs=2
startretries=10
stderr_logfile=/data/redis_err.log
stdout_logfile=/data/redis.log
user=breaker

; ------------------------------------------------------------------------------
; FastAPI backend API (Uvicorn)
; Inherits CB_DB_URL, CB_DATA_DIR, NATS_URL, CB_VAULT_KEY, etc. from container env.
; ------------------------------------------------------------------------------
[program:backend-api]
priority=30
command=/usr/local/bin/uvicorn app.main:app --host 127.0.0.1 --port 8000 --workers 2 --no-access-log
directory=/app/backend
autostart=true
autorestart=true
startsecs=5
stopwaitsecs=20
stdout_logfile=/data/backend_api.log
stderr_logfile=/data/backend_api_err.log
user=breaker

; ------------------------------------------------------------------------------
; Unified workers (discovery, notification, telemetry, monitoring)
; Each instance passes its worker type by name (not a positional index) so a
; retired/renamed type can never silently point at the wrong worker — that
; happened once already when the numeric index 1 ("webhook") outlived the
; webhook feature it referred to and crash-looped with "Unknown worker type".
; monitor_poll is scaled to 2 instances (JetStream consumer); monitor_scheduler
; is an advisory-lock singleton and must stay at 1.
; ------------------------------------------------------------------------------
; Launched via setpriv instead of user=breaker: the launcher starts as root,
; drops to breaker, and carries ambient CAP_NET_RAW into the worker so nmap
; children inherit raw-socket privilege (ambient caps survive execve even
; under no-new-privileges; file caps on the nmap binary would not).
[program:worker-discovery]
priority=30
command=/usr/bin/setpriv --reuid breaker --regid breaker --init-groups --ambient-caps +net_raw --inh-caps +net_raw /usr/bin/python -m app.workers.main --type=discovery
directory=/app/backend
autostart=true
autorestart=true
startsecs=5
stopwaitsecs=20
stdout_logfile=/data/worker_discovery.log
stderr_logfile=/data/worker_discovery_err.log

[program:worker-notification]
priority=30
command=/usr/bin/setpriv --reuid breaker --regid breaker --init-groups --ambient-caps +net_raw --inh-caps +net_raw /usr/bin/python -m app.workers.main --type=notification
directory=/app/backend
autostart=true
autorestart=true
startsecs=5
stopwaitsecs=20
stdout_logfile=/data/worker_notification.log
stderr_logfile=/data/worker_notification_err.log

[program:worker-telemetry]
priority=30
command=/usr/bin/setpriv --reuid breaker --regid breaker --init-groups --ambient-caps +net_raw --inh-caps +net_raw /usr/bin/python -m app.workers.main --type=telemetry
directory=/app/backend
autostart=true
autorestart=true
startsecs=5
stopwaitsecs=20
stdout_logfile=/data/worker_telemetry.log
stderr_logfile=/data/worker_telemetry_err.log

[program:worker-monitor-scheduler]
priority=30
command=/usr/bin/setpriv --reuid breaker --regid breaker --init-groups --ambient-caps +net_raw --inh-caps +net_raw /usr/bin/python -m app.workers.main --type=monitor_scheduler
directory=/app/backend
autostart=true
autorestart=true
startsecs=5
stopwaitsecs=20
stdout_logfile=/data/worker_monitor_scheduler.log
stderr_logfile=/data/worker_monitor_scheduler_err.log

[program:worker-monitor-poll]
priority=30
numprocs=2
process_name=worker-monitor-poll-%(process_num)d
command=/usr/bin/setpriv --reuid breaker --regid breaker --init-groups --ambient-caps +net_raw --inh-caps +net_raw /usr/bin/python -m app.workers.main --type=monitor_poll
directory=/app/backend
autostart=true
autorestart=true
startsecs=5
stopwaitsecs=20
stdout_logfile=/data/worker_monitor_poll_%(process_num)d.log
stderr_logfile=/data/worker_monitor_poll_%(process_num)d_err.log

; ------------------------------------------------------------------------------
; Nginx (frontend SPA + API proxy + WebSockets). Runs as breaker on 8080/8443.
; ------------------------------------------------------------------------------
[program:nginx]
priority=40
command=/usr/sbin/nginx -g 'daemon off;'
autostart=true
autorestart=true
startsecs=3
stdout_logfile=/data/nginx.log
stderr_logfile=/data/nginx_err.log
user=breaker

