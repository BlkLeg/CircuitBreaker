# Optional override: mount the Docker socket for Docker-aware discovery.
# Use only when you need container/network enumeration from discovery.
#
# Usage (dev):  docker compose -f docker-compose.yml -f docker-compose.docker-socket.yml up -d
# Usage (prod): docker compose -f docker-compose.prod.yml -f docker-compose.docker-socket.yml up -d
#
# Requires "Docker Container Discovery" enabled in Settings → Discovery.
# Security: mounting the socket (even read-only) allows listing containers/images;
# use only on trusted hosts. Default is no socket mount.

name: circuitbreaker

services:
  backend:
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
