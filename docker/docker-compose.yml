# Circuit Breaker — single-container deployment
#
# One image: Postgres + NATS + backend + workers + nginx.
# From repo root, `docker compose up --build -d` builds from Dockerfile.mono and runs it.
#
# Usage (from repo root):
#   docker compose up -d
#   CB_TAG=v0.2.0 docker compose -f docker/docker-compose.yml up -d
#
# Required env: CB_DB_PASSWORD, CB_VAULT_KEY, CB_JWT_SECRET, NATS_AUTH_TOKEN (or set in .env / -e).
# Optional: CB_DATA_DIR, CB_DB_URL, CB_PORT_HTTP, CB_PORT_HTTPS, CB_TAG, NATS_AUTH_TOKEN, CB_ENABLE_TLS
#
# Data: bind mount ./circuitbreaker-data (or CB_DATA_DIR) to /data.
#
# External Postgres (CB_DB_URL): If you set CB_DB_URL to a host other than 127.0.0.1/localhost,
# users and sessions live only in that database. CB_DATA_DIR and compose-clean do NOT touch it.
# For a full reset with external Postgres you must drop/recreate the circuitbreaker database
# (or use embedded Postgres by leaving CB_DB_URL unset or set to ...@127.0.0.1:5432/...).

name: circuitbreaker

services:
  circuitbreaker:
    build:
      context: ..
      dockerfile: Dockerfile.mono
    image: ghcr.io/blkleg/circuitbreaker:mono-${CB_TAG:-latest}
    container_name: circuitbreaker
    restart: unless-stopped
    ports:
      - "${CB_PORT_HTTP:-80}:8080"
      - "${CB_PORT_HTTPS:-443}:8443"
    volumes:
      - "${CB_DATA_DIR:-./circuitbreaker-data}:/data:z"
      # Docker socket is NOT mounted by default — it grants near-root host access.
      # To enable Docker discovery, use one of:
      #   1. docker compose -f docker-compose.yml -f docker-compose.socket.yml up -d
      #   2. Set CB_DOCKER_HOST to a TCP Docker API proxy (e.g. Tecnativa/docker-socket-proxy)
    read_only: true
    tmpfs:
      - /tmp:size=100M
      - /run:size=10M
      - /var/log:size=50M
      - /var/lib/nginx:size=10M
      - /var/lib/postgresql:size=10M
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_RAW
      - NET_BIND_SERVICE
      - CHOWN
      - FOWNER
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    environment:
      - CB_DB_PASSWORD=${CB_DB_PASSWORD:?Set CB_DB_PASSWORD}
      - CB_VAULT_KEY=${CB_VAULT_KEY:?Set CB_VAULT_KEY}
      - CB_JWT_SECRET=${CB_JWT_SECRET:?Set CB_JWT_SECRET}
      - NATS_AUTH_TOKEN=${NATS_AUTH_TOKEN:?Set NATS_AUTH_TOKEN for internal bus auth}
      - CB_REDIS_URL=${CB_REDIS_URL:-}
      - CB_REDIS_URL_SET_BY_USER=${CB_REDIS_URL:+1}
      - CB_AIRGAP=${CB_AIRGAP:-false}
      - CB_DOCKER_HOST=${CB_DOCKER_HOST:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8080/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
        compress: "true"
