services:
  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    container_name: cb-backend
    env_file:
      - ../backend/.env
    volumes:
      - backend-data:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/app.db
      - UPLOADS_DIR=/app/data/uploads
      - DEBUG=false
      # Optional: set a persistent Fernet key for the telemetry credential vault.
      # If unset, an ephemeral key is generated each restart (credentials lost on restart).
      # Generate: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
      - CB_VAULT_KEY=
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    # ──────────────────────────────────────────────────────────────────
    # AUTO-DISCOVERY: ARP SCAN CAPABILITIES (OPTIONAL)
    #
    # The ARP scan phase requires elevated Linux capabilities to send
    # raw network packets. This enables MAC address resolution and
    # more reliable local subnet host detection.
    #
    # SECURITY TRADE-OFF: Granting NET_RAW and NET_ADMIN gives the
    # container the ability to craft and send arbitrary raw packets.
    # Only enable this on trusted, isolated homelab networks.
    #
    # If left commented out, Circuit Breaker will automatically skip
    # the ARP phase and fall back to nmap TCP/ICMP host detection.
    # All other scan phases (nmap, SNMP, HTTP) work without these caps.
    #
    # To enable ARP scanning, uncomment the section below:
    cap_add:
      - NET_RAW
      - NET_ADMIN
    #
    # For full documentation see:
    # https://blkleg.github.io/CircuitBreaker/discovery#arp-capabilities
    # ──────────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
    ports:
      - "8080:8080"
    container_name: cb-frontend
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  backend-data:
