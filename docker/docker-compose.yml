services:
  postgres:
    # Optional PostgreSQL service — only starts when the "pg" profile is active.
    # Default deployment uses SQLite (DATABASE_URL=sqlite:///.../app.db).
    # To use PostgreSQL: docker compose --profile pg up
    profiles: ["pg"]
    image: postgres:16-alpine
    container_name: cb-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=circuitbreaker
      - POSTGRES_USER=breaker
      - POSTGRES_PASSWORD=${CB_DB_PASSWORD:-breaker}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "breaker", "-d", "circuitbreaker"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  nats:
    image: nats:2-alpine
    container_name: cb-nats
    restart: unless-stopped
    # JetStream enabled for optional durable message streams.
    # Management HTTP on port 8222 — not exposed externally by default.
    command: ["--jetstream", "-m", "8222"]
    expose:
      - "4222"
      - "8222"
    volumes:
      - nats_data:/data/nats

  caddy:
    image: caddy:2-alpine
    container_name: cb-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
    environment:
      # Domain Caddy listens on. Set to a public FQDN for automatic ACME certs.
      - CB_DOMAIN=${CB_DOMAIN:-circuitbreaker.local}
      # Email for ACME / Let's Encrypt — required for public domains. A placeholder
      # is used by default (ignored when local_certs is active).
      - CB_TLS_EMAIL=${CB_TLS_EMAIL:-admin@circuitbreaker.local}
      # "local_certs" for .local/LAN domains (default); empty string for ACME/Let's Encrypt.
      - CB_LOCAL_CERTS=${CB_LOCAL_CERTS:-local_certs}
    restart: unless-stopped

  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    container_name: cb-backend
    volumes:
      - backend-data:/app/data
      - ../data/uploads/icons:/app/data/uploads/icons
      - ../data/uploads/branding:/app/data/uploads/branding
      # Docker socket for container auto-discovery (read-only).
      # Requires "Docker Container Discovery" enabled in Settings → Discovery.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      nats:
        condition: service_started
    environment:
      # SQLite by default; set CB_DB_URL for PostgreSQL (see README.md).
      - DATABASE_URL=${CB_DB_URL:-sqlite:////app/data/app.db}
      - UPLOADS_DIR=/app/data/uploads
      - DEBUG=false
      # Auto-generated during OOBE and persisted to /data/.env in the volume.
      # Pre-seed with CB_VAULT_KEY=<key> in docker/.env to skip generation.
      - CB_VAULT_KEY=${CB_VAULT_KEY:-}
      - DISCOVERY_MODE=safe
      - NATS_URL=nats://nats:4222
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    # ARP scanning (native Linux Docker only) — uncomment to enable full discovery mode.
    # See README.md → "ARP Scan / Full Discovery" for setup instructions and caveats.
    # cap_add:
    #   - NET_RAW
    #   - NET_ADMIN
    # network_mode: "host"

  worker:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    command: ["python", "-m", "app.workers.discovery"]
    volumes:
      - backend-data:/app/data
    depends_on:
      nats:
        condition: service_started
    environment:
      - DATABASE_URL=${CB_DB_URL:-sqlite:////app/data/app.db}
      - DISCOVERY_MODE=full
      - NATS_URL=nats://nats:4222
      - NATS_KV_SYNC=true
    deploy:
      replicas: 2
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import os,time; f='/tmp/worker.healthy'; raise SystemExit(0 if os.path.exists(f) and time.time()-os.path.getmtime(f)<120 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

  webhook-worker:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    command: ["python", "-m", "app.workers.webhook_worker"]
    volumes:
      - backend-data:/app/data
    depends_on:
      nats:
        condition: service_started
    environment:
      - DATABASE_URL=${CB_DB_URL:-sqlite:////app/data/app.db}
      - NATS_URL=nats://nats:4222
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import os,time; f='/tmp/worker.healthy'; raise SystemExit(0 if os.path.exists(f) and time.time()-os.path.getmtime(f)<120 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

  notification-worker:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    command: ["python", "-m", "app.workers.notification_worker"]
    volumes:
      - backend-data:/app/data
    depends_on:
      nats:
        condition: service_started
    environment:
      - DATABASE_URL=${CB_DB_URL:-sqlite:////app/data/app.db}
      - NATS_URL=nats://nats:4222
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import os,time; f='/tmp/worker.healthy'; raise SystemExit(0 if os.path.exists(f) and time.time()-os.path.getmtime(f)<120 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
    expose:
      - "8080"
    container_name: cb-frontend
    depends_on:
      backend:
        condition: service_healthy
    # Required only when backend uses network_mode: "host" (ARP scanning).
    # extra_hosts:
    #   - "backend:host-gateway"
    restart: unless-stopped

volumes:
  postgres_data:
  backend-data:
  caddy_data:
  caddy_config:
  nats_data:
