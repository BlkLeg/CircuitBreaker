# Circuit Breaker — single-container deployment
#
# One image: Postgres + NATS + backend + workers + nginx.
# From repo root, `docker compose up --build -d` builds from Dockerfile.mono and runs it.
#
# Usage (from repo root):
#   docker compose up -d
#   CB_TAG=v0.2.0 docker compose -f docker/docker-compose.yml up -d
#
# Required env: CB_DB_PASSWORD, CB_VAULT_KEY (or set in .env / -e).
# Optional: CB_DATA_DIR, CB_PORT_HTTP, CB_PORT_HTTPS, CB_TAG, NATS_AUTH_TOKEN, CB_ENABLE_TLS
#
# Data: bind mount ./circuitbreaker-data (or CB_DATA_DIR) to /data.

name: circuitbreaker

services:
  circuitbreaker:
    build:
      context: ..
      dockerfile: Dockerfile.mono
    image: ghcr.io/blkleg/circuitbreaker:mono-${CB_TAG:-latest}
    container_name: circuitbreaker
    restart: unless-stopped
    ports:
      - "${CB_PORT_HTTP:-80}:80"
      - "${CB_PORT_HTTPS:-443}:443"
    volumes:
      - "${CB_DATA_DIR:-./circuitbreaker-data}:/data"
    environment:
      - CB_DB_PASSWORD=${CB_DB_PASSWORD:?Set CB_DB_PASSWORD}
      - CB_VAULT_KEY=${CB_VAULT_KEY:?Set CB_VAULT_KEY}
      - NATS_AUTH_TOKEN=${NATS_AUTH_TOKEN:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:80/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s
