# Override fragment: expose Postgres on localhost:5432 for local migrations and dev.
# Use with: docker compose -f docker-compose.yml -f docker/docker-compose.dev-db.yml up -d postgres
# Then run migrations from host: make db-migrate-local (or set CB_DB_URL and alembic upgrade head)
#
# From repo root:
#   docker compose -f docker-compose.yml -f docker/docker-compose.dev-db.yml up -d postgres
# Or: make db-postgres-up
name: circuitbreaker

services:
  postgres:
    ports:
      - "5432:5432"
