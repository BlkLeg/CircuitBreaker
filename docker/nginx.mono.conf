events {
    worker_connections 1024;
}

pid /tmp/nginx.pid;
error_log /dev/stderr warn;

http {
    include       mime.types;
    default_type  application/octet-stream;
    access_log /dev/stdout;

    sendfile        on;
    keepalive_timeout  65;
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path /tmp/proxy_temp;
    fastcgi_temp_path /tmp/fastcgi_temp;
    uwsgi_temp_path /tmp/uwsgi_temp;
    scgi_temp_path /tmp/scgi_temp;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript
               application/json application/xml image/svg+xml font/woff2;

    # -------------------------------------------------------------------------
    # Server block 1: HTTP (container port 8080) — redirect to HTTPS.
    # Health endpoint is exempted so Docker healthchecks still work over HTTP.
    # -------------------------------------------------------------------------
    server {
        listen 8080;
        client_max_body_size 10m;

        location @backend_warming_up {
            default_type application/json;
            # nosemgrep: generic.nginx.security.header-redefinition.header-redefinition
            add_header   Retry-After 5 always;
            return 503 '{"status":"warming_up","message":"Service is starting up, please retry in a few seconds."}';
        }

        set $backend "http://127.0.0.1:8000";

        location = /api/v1/health {
            proxy_connect_timeout  5s;
            proxy_next_upstream    error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 1;
            error_page 502 503 504 = @backend_warming_up;

            proxy_pass $backend; # nosemgrep: generic.nginx.security.missing-internal.missing-internal,generic.nginx.security.possible-h2c-smuggling.possible-nginx-h2c-smuggling
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header Upgrade           "";
            proxy_set_header Connection        "";
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # -------------------------------------------------------------------------
    # Server block 2: HTTPS (container port 8443) — main application server.
    # TLS expects certs under /data/tls/{fullchain.pem,privkey.pem}.
    # -------------------------------------------------------------------------
    server {
        listen 8443 ssl http2;
        ssl_certificate     /data/tls/fullchain.pem;
        ssl_certificate_key /data/tls/privkey.pem;

        root   /app/frontend/dist;
        index  index.html;
        client_max_body_size 10m;

        location @backend_warming_up {
            default_type application/json;
            # nosemgrep: generic.nginx.security.header-redefinition.header-redefinition
            add_header   Retry-After 5 always;
            return 503 '{"status":"warming_up","message":"Service is starting up, please retry in a few seconds."}';
        }

        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'strict-dynamic'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://www.gravatar.com https://secure.gravatar.com https://avatars.githubusercontent.com; connect-src 'self' ws: wss: https://geocoding-api.open-meteo.com https://api.open-meteo.com; frame-ancestors 'none';" always;
        add_header X-Content-Type-Options  "nosniff"                          always;
        add_header X-Frame-Options         "DENY"                             always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin"  always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()" always;

        # Long-term caching for hashed static assets.
        location ~* \.(js|css|woff2?|ttf|eot|png|jpg|jpeg|gif|svg|ico|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # Backend API + streams
        set $backend "http://127.0.0.1:8000";

        # WebSocket / SSE endpoints (mirrors docker/nginx.conf behavior).
        location = /api/v1/discovery/stream {
            proxy_pass         $backend; # nosemgrep: generic.nginx.security.missing-internal.missing-internal,generic.nginx.security.possible-h2c-smuggling.possible-nginx-h2c-smuggling
            proxy_http_version 1.1; # nosemgrep: generic.nginx.security.possible-h2c-smuggling.possible-nginx-h2c-smuggling
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 3600s;
        }

        location = /api/v1/topology/stream {
            proxy_pass         $backend; # nosemgrep: generic.nginx.security.missing-internal.missing-internal,generic.nginx.security.possible-h2c-smuggling.possible-nginx-h2c-smuggling
            proxy_http_version 1.1; # nosemgrep: generic.nginx.security.possible-h2c-smuggling.possible-nginx-h2c-smuggling
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Authorization     $http_authorization;
            proxy_read_timeout 3600s;
        }

        location = /api/v1/status/stream {
            proxy_pass         $backend; # nosemgrep: generic.nginx.security.missing-internal.missing-internal,generic.nginx.security.possible-h2c-smuggling.possible-nginx-h2c-smuggling
            proxy_http_version 1.1; # nosemgrep: generic.nginx.security.possible-h2c-smuggling.possible-nginx-h2c-smuggling
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Authorization     $http_authorization;
            proxy_read_timeout 3600s;
        }

        location = /api/v1/telemetry/stream {
            proxy_pass         $backend; # nosemgrep: generic.nginx.security.missing-internal.missing-internal,generic.nginx.security.possible-h2c-smuggling.possible-nginx-h2c-smuggling
            proxy_http_version 1.1; # nosemgrep: generic.nginx.security.possible-h2c-smuggling.possible-nginx-h2c-smuggling
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Authorization     $http_authorization;
            proxy_read_timeout 3600s;
        }

        location = /api/v1/events/stream {
            proxy_pass         $backend; # nosemgrep: generic.nginx.security.missing-internal.missing-internal,generic.nginx.security.possible-h2c-smuggling.possible-nginx-h2c-smuggling
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Authorization     $http_authorization;
            proxy_set_header   Upgrade           "";
            proxy_set_header   Connection        "";
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 3600s;
        }

        # Backend API proxy
        location ^~ /api/ {
            proxy_connect_timeout  5s;
            proxy_next_upstream    error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 1;
            error_page 502 503 504 = @backend_warming_up;

            proxy_pass $backend; # nosemgrep: generic.nginx.security.missing-internal.missing-internal,generic.nginx.security.possible-h2c-smuggling.possible-nginx-h2c-smuggling
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header Authorization     $http_authorization;
            proxy_set_header Upgrade           "";
            proxy_set_header Connection        "";
            proxy_read_timeout 30s;
        }

        # User-uploaded content proxied to backend
        location ^~ /user-icons/ {
            proxy_connect_timeout  5s;
            proxy_next_upstream    error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 1;
            error_page 502 503 504 = @backend_warming_up;

            proxy_pass $backend; # nosemgrep: generic.nginx.security.missing-internal.missing-internal,generic.nginx.security.possible-h2c-smuggling.possible-nginx-h2c-smuggling
            proxy_http_version 1.1;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Upgrade         "";
            proxy_set_header Connection      "";
        }

        location ^~ /branding/ {
            proxy_connect_timeout  5s;
            proxy_next_upstream    error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 1;
            error_page 502 503 504 = @backend_warming_up;

            proxy_pass $backend; # nosemgrep: generic.nginx.security.missing-internal.missing-internal,generic.nginx.security.possible-h2c-smuggling.possible-nginx-h2c-smuggling
            proxy_http_version 1.1;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Upgrade         "";
            proxy_set_header Connection      "";
        }

        location ^~ /uploads/ {
            proxy_connect_timeout  5s;
            proxy_next_upstream    error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 1;
            error_page 502 503 504 = @backend_warming_up;

            proxy_pass $backend; # nosemgrep: generic.nginx.security.missing-internal.missing-internal,generic.nginx.security.possible-h2c-smuggling.possible-nginx-h2c-smuggling
            proxy_http_version 1.1;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Upgrade         "";
            proxy_set_header Connection      "";
        }

        # React SPA catch-all
        location / {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            try_files $uri $uri/ /index.html;
        }
    }
}

