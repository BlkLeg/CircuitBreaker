events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # -------------------------------------------------------------------------
    # Server: HTTP (always enabled) and optional HTTPS (when CB_ENABLE_TLS=1).
    # TLS expects certs under /data/tls/{fullchain.pem,privkey.pem}.
    # -------------------------------------------------------------------------
    server {
        listen 80;

        location @backend_warming_up {
            default_type application/json;
            add_header   Retry-After 5 always;
            return 503 '{"status":"warming_up","message":"Service is starting up, please retry in a few seconds."}';
        }

        # HTTPS listener is enabled when CB_ENABLE_TLS=1 and certs are present.
        # The env var is injected at container start; if unset, nginx still
        # starts with HTTP-only. We rely on install-mono.sh docs for TLS mount.
        listen 443 ssl http2;
        ssl_certificate     /data/tls/fullchain.pem;
        ssl_certificate_key /data/tls/privkey.pem;

        root   /app/frontend/dist;
        index  index.html;
        client_max_body_size 10m;

        # Security headers (aligned with existing nginx.conf and docs).
        add_header X-Content-Type-Options  "nosniff"                          always;
        add_header X-Frame-Options         "SAMEORIGIN"                       always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin"  always;

        # HTTP Strict Transport Security (only meaningful for HTTPS).
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Long-term caching for hashed static assets.
        location ~* \.(js|css|woff2?|ttf|eot|png|jpg|jpeg|gif|svg|ico|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # Backend API + streams
        set $backend "http://127.0.0.1:8000";

        # WebSocket / SSE endpoints (mirrors docker/nginx.conf behavior).
        location = /api/v1/discovery/stream {
            proxy_pass         $backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 3600s;
        }

        location = /api/v1/topology/stream {
            proxy_pass         $backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Authorization     $http_authorization;
            proxy_read_timeout 3600s;
        }

        location = /api/v1/status/stream {
            proxy_pass         $backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Authorization     $http_authorization;
            proxy_read_timeout 3600s;
        }

        location = /api/v1/events/stream {
            proxy_pass         $backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Authorization     $http_authorization;
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 3600s;
        }

        # Backend API proxy
        location ^~ /api/ {
            proxy_connect_timeout  5s;
            proxy_next_upstream    error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 1;
            error_page 502 503 504 = @backend_warming_up;

            proxy_pass $backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header Authorization     $http_authorization;
            proxy_read_timeout 30s;
        }

        # User-uploaded content proxied to backend
        location ^~ /user-icons/ {
            proxy_connect_timeout  5s;
            proxy_next_upstream    error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 1;
            error_page 502 503 504 = @backend_warming_up;

            proxy_pass $backend;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location ^~ /branding/ {
            proxy_connect_timeout  5s;
            proxy_next_upstream    error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 1;
            error_page 502 503 504 = @backend_warming_up;

            proxy_pass $backend;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location ^~ /uploads/ {
            proxy_connect_timeout  5s;
            proxy_next_upstream    error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 1;
            error_page 502 503 504 = @backend_warming_up;

            proxy_pass $backend;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # React SPA catch-all
        location / {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            try_files $uri $uri/ /index.html;
        }
    }
}

