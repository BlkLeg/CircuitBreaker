# Circuit Breaker — single-container prebuilt (no build, no clone).
#
# Used by install.sh --mode compose. One image: Postgres + NATS + backend + workers + nginx.
# Download: curl -fsSL .../docker/docker-compose.prod.yml -o docker-compose.prod.yml
#
# Usage (from directory containing this file and .env):
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d
#
# Required in .env: CB_DB_PASSWORD, CB_VAULT_KEY.
# Optional: CB_DATA_DIR, CB_PORT_HTTP (default 80), CB_PORT_HTTPS (default 443), CB_TAG (default latest), NATS_AUTH_TOKEN.

name: circuitbreaker

services:
  circuitbreaker:
    image: ghcr.io/blkleg/circuitbreaker:mono-${CB_TAG:-latest}
    container_name: circuitbreaker
    restart: unless-stopped
    ports:
      - "${CB_PORT_HTTP:-80}:80"
      - "${CB_PORT_HTTPS:-443}:443"
    volumes:
      - "${CB_DATA_DIR:-./circuitbreaker-data}:/data"
    environment:
      - CB_DB_PASSWORD=${CB_DB_PASSWORD:?Set CB_DB_PASSWORD in .env}
      - CB_VAULT_KEY=${CB_VAULT_KEY:?Set CB_VAULT_KEY in .env}
      - NATS_AUTH_TOKEN=${NATS_AUTH_TOKEN:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:80/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 90s
