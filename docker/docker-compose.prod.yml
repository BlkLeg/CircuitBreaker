# Circuit Breaker — Prebuilt multi-image compose (zero build)
#
# Uses GHCR images. No clone or local build required.
# Quick start: curl install.sh | bash (with CB_MODE=compose)
#
# To pin a version: CB_TAG=v1.2.0 docker compose -f docker-compose.prod.yml up -d
# To upgrade: docker compose -f docker-compose.prod.yml pull && docker compose up -d
#
# Requires: Caddyfile and .env in the same directory as this file.
name: circuitbreaker

networks:
  cb_net:
    name: circuitbreaker
    driver: bridge

services:
  postgres:
    profiles: ["pg"]
    image: postgres:16-alpine
    container_name: cb-postgres
    restart: unless-stopped
    networks: [cb_net]
    environment:
      - POSTGRES_DB=circuitbreaker
      - POSTGRES_USER=breaker
      - POSTGRES_PASSWORD=${CB_DB_PASSWORD:-breaker}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "breaker", "-d", "circuitbreaker"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  nats:
    image: nats:2-alpine
    container_name: cb-nats
    restart: unless-stopped
    networks: [cb_net]
    command: ["--jetstream", "-m", "8222"]
    expose:
      - "4222"
      - "8222"
    volumes:
      - nats_data:/data/nats

  caddy:
    image: caddy:2-alpine
    container_name: cb-caddy
    networks: [cb_net]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
    environment:
      - CB_DOMAIN=${CB_DOMAIN:-circuitbreaker.local}
      - CB_TLS_EMAIL=${CB_TLS_EMAIL:-admin@circuitbreaker.local}
      - CB_LOCAL_CERTS=${CB_LOCAL_CERTS:-local_certs}
    restart: unless-stopped

  backend:
    image: ghcr.io/blkleg/circuitbreaker:backend-${CB_TAG:-latest}
    container_name: cb-backend
    networks: [cb_net]
    volumes:
      - backend-data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      nats:
        condition: service_started
    environment:
      - DATABASE_URL=${CB_DB_URL:-sqlite:////app/data/app.db}
      - CB_DATA_DIR=/app/data
      - UPLOADS_DIR=/app/data/uploads
      - DEBUG=false
      - CB_VAULT_KEY=${CB_VAULT_KEY:-}
      - DISCOVERY_MODE=safe
      - NATS_URL=nats://nats:4222
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  worker:
    image: ghcr.io/blkleg/circuitbreaker:backend-${CB_TAG:-latest}
    command: ["python", "-m", "app.workers.discovery"]
    networks: [cb_net]
    volumes:
      - backend-data:/app/data
    depends_on:
      nats:
        condition: service_started
    environment:
      - DATABASE_URL=${CB_DB_URL:-sqlite:////app/data/app.db}
      - CB_DATA_DIR=/app/data
      - DISCOVERY_MODE=full
      - NATS_URL=nats://nats:4222
      - NATS_KV_SYNC=true
    deploy:
      replicas: 2
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import os,time; f='/tmp/worker.healthy'; raise SystemExit(0 if os.path.exists(f) and time.time()-os.path.getmtime(f)<120 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

  webhook-worker:
    image: ghcr.io/blkleg/circuitbreaker:backend-${CB_TAG:-latest}
    command: ["python", "-m", "app.workers.webhook_worker"]
    networks: [cb_net]
    volumes:
      - backend-data:/app/data
    depends_on:
      nats:
        condition: service_started
    environment:
      - DATABASE_URL=${CB_DB_URL:-sqlite:////app/data/app.db}
      - CB_DATA_DIR=/app/data
      - NATS_URL=nats://nats:4222
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import os,time; f='/tmp/worker.healthy'; raise SystemExit(0 if os.path.exists(f) and time.time()-os.path.getmtime(f)<120 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

  notification-worker:
    image: ghcr.io/blkleg/circuitbreaker:backend-${CB_TAG:-latest}
    command: ["python", "-m", "app.workers.notification_worker"]
    networks: [cb_net]
    volumes:
      - backend-data:/app/data
    depends_on:
      nats:
        condition: service_started
    environment:
      - DATABASE_URL=${CB_DB_URL:-sqlite:////app/data/app.db}
      - CB_DATA_DIR=/app/data
      - NATS_URL=nats://nats:4222
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import os,time; f='/tmp/worker.healthy'; raise SystemExit(0 if os.path.exists(f) and time.time()-os.path.getmtime(f)<120 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

  frontend:
    image: ghcr.io/blkleg/circuitbreaker:frontend-${CB_TAG:-latest}
    expose:
      - "8080"
    container_name: cb-frontend
    networks: [cb_net]
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  cloudflared:
    profiles: ["tunnel"]
    image: cloudflare/cloudflared:latest
    container_name: cb-cloudflared
    networks: [cb_net]
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    env_file:
      - path: ./.env
        required: false
    depends_on:
      - caddy
    restart: unless-stopped

volumes:
  postgres_data:
  backend-data:
  caddy_data:
  caddy_config:
  nats_data:
