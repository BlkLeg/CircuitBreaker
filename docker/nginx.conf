server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 10m;

    # Docker's embedded DNS resolver — re-resolve upstream hostnames every 10 s.
    # Without this, nginx caches the backend IP at startup and breaks after a
    # container rebuild assigns a new IP to the backend service.
    # NOTE: proxy_pass must use a variable (set $backend ...) for this to take effect.
    # Security: $backend is a fixed internal service (backend:8000), not user-controlled; no SSRF from client input. # nosem
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $backend "http://backend:8000";

    # ── Compression ──────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'strict-dynamic'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://www.gravatar.com https://secure.gravatar.com https://avatars.githubusercontent.com; connect-src 'self' ws: wss: https://geocoding-api.open-meteo.com https://api.open-meteo.com; frame-ancestors 'none';" always;
    add_header X-Content-Type-Options  "nosniff"                          always;
    add_header X-Frame-Options         "DENY"                             always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin"  always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()" always;

    # ── Long-term caching for Vite-hashed static assets ───────────────────────
    # Vite appends a content hash to every JS/CSS/font file name, so these
    # files are safe to cache indefinitely. index.html is NOT matched here
    # so the browser always re-fetches the entry point on deploy.
    location ~* \.(js|css|woff2?|ttf|eot|png|jpg|jpeg|gif|svg|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── WebSocket: discovery live stream ─────────────────────────────────────
    location = /api/v1/discovery/stream {
        proxy_pass         $backend; # nosemgrep: generic.nginx.security.missing-internal.missing-internal,generic.nginx.security.possible-h2c-smuggling.possible-nginx-h2c-smuggling
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
    }

    # ── WebSocket: topology live stream ───────────────────────────────────────
    location = /api/v1/topology/stream {
        proxy_pass         $backend; # nosemgrep: generic.nginx.security.missing-internal.missing-internal,generic.nginx.security.possible-h2c-smuggling.possible-nginx-h2c-smuggling
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Authorization     $http_authorization;
        proxy_read_timeout 3600s;
    }

    # ── WebSocket: status dashboard live stream ────────────────────────────────
    location = /api/v1/status/stream {
        proxy_pass         $backend; # nosemgrep: generic.nginx.security.missing-internal.missing-internal,generic.nginx.security.possible-h2c-smuggling.possible-nginx-h2c-smuggling
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Authorization     $http_authorization;
        proxy_read_timeout 3600s;
    }

    # ── WebSocket: telemetry live stream ───────────────────────────────────────
    location = /api/v1/telemetry/stream {
        proxy_pass         $backend; # nosemgrep: generic.nginx.security.missing-internal.missing-internal,generic.nginx.security.possible-h2c-smuggling.possible-nginx-h2c-smuggling
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Authorization     $http_authorization;
        proxy_read_timeout 3600s;
    }

    # ── SSE: events stream (long-lived HTTP) ──────────────────────────────────
    location = /api/v1/events/stream {
        proxy_pass         $backend; # nosemgrep: generic.nginx.security.missing-internal.missing-internal,generic.nginx.security.possible-h2c-smuggling.possible-nginx-h2c-smuggling
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Authorization     $http_authorization;
        proxy_set_header   Upgrade           "";
        proxy_set_header   Connection        "";
        proxy_buffering    off;
        proxy_cache       off;
        proxy_read_timeout 3600s;
    }

    # ── Backend API proxy ─────────────────────────────────────────────────────
    location ^~ /api/ {
        proxy_pass $backend; # nosemgrep: generic.nginx.security.missing-internal.missing-internal,generic.nginx.security.possible-h2c-smuggling.possible-nginx-h2c-smuggling
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header Authorization     $http_authorization;
        proxy_set_header Upgrade           "";
        proxy_set_header Connection        "";
        proxy_read_timeout 30s;
    }

    # ── User-uploaded content proxied to backend ──────────────────────────────

    # User icon uploads
    location ^~ /user-icons/ {
        proxy_pass $backend; # nosemgrep: generic.nginx.security.missing-internal.missing-internal,generic.nginx.security.possible-h2c-smuggling.possible-nginx-h2c-smuggling
        proxy_http_version 1.1;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade         "";
        proxy_set_header Connection      "";
    }

    # Branding assets (logos, favicons)
    location ^~ /branding/ {
        proxy_pass $backend; # nosemgrep: generic.nginx.security.missing-internal.missing-internal,generic.nginx.security.possible-h2c-smuggling.possible-nginx-h2c-smuggling
        proxy_http_version 1.1;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade         "";
        proxy_set_header Connection      "";
    }

    # Profile photos and all other uploads (e.g. /uploads/profiles/*)
    location ^~ /uploads/ {
        proxy_pass $backend; # nosemgrep: generic.nginx.security.missing-internal.missing-internal,generic.nginx.security.possible-h2c-smuggling.possible-nginx-h2c-smuggling
        proxy_http_version 1.1;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade         "";
        proxy_set_header Connection      "";
    }

    # ── React SPA catch-all ───────────────────────────────────────────────────
    # Serve index.html for all non-file routes so client-side routing works.
    # Prevent caching so deploy always serves fresh shell and asset paths.
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri $uri/ /index.html;
    }
}
