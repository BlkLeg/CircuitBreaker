server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    # ── Compression ──────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"                          always;
    add_header X-Frame-Options         "SAMEORIGIN"                       always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin"  always;

    # ── Long-term caching for Vite-hashed static assets ───────────────────────
    # Vite appends a content hash to every JS/CSS/font file name, so these
    # files are safe to cache indefinitely. index.html is NOT matched here
    # so the browser always re-fetches the entry point on deploy.
    location ~* \.(js|css|woff2?|ttf|eot|png|jpg|jpeg|gif|svg|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Backend API proxy ─────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header Authorization     $http_authorization;
        proxy_read_timeout 30s;
    }

    # ── User-uploaded content proxied to backend ──────────────────────────────

    # User icon uploads
    location /user-icons/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Branding assets (logos, favicons)
    location /branding/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Profile photos and all other uploads (e.g. /uploads/profiles/*)
    location /uploads/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── React SPA catch-all ───────────────────────────────────────────────────
    # Serve index.html for all non-file routes so client-side routing works.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
